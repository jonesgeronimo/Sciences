<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intensité électrique – Calcul guidé</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #f5c842;
    --accent2: #4ec9b0;
    --danger: #ff6b6b;
    --success: #6bffb8;
    --text: #e8eaf0;
    --muted: #6b7080;
    --border: #2e3248;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }
  header { text-align: center; margin-bottom: 32px; }
  header h1 {
    font-size: clamp(1.5rem, 5vw, 2.4rem);
    font-weight: 800;
    background: linear-gradient(120deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  header p { margin-top: 6px; color: var(--muted); font-size: 0.9rem; font-family: 'DM Mono', monospace; }

  .progress-bar-wrap { max-width: 580px; margin: 0 auto 28px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.5s ease; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 580px;
    margin: 0 auto;
    padding: 24px 20px 20px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .step-badge {
    display: inline-block; background: var(--surface2); color: var(--accent);
    font-family: 'DM Mono', monospace; font-size: 0.72rem; padding: 3px 10px;
    border-radius: 99px; border: 1px solid var(--border); margin-bottom: 10px;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }

  .circuit-img {
    width: 100%; max-width: 420px;
    display: block; margin: 0 auto 20px;
    border-radius: 10px;
    background: #fff;
    padding: 8px;
  }

  .inputs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .input-group { display: flex; flex-direction: column; gap: 4px; }
  .input-group label { font-size: 0.78rem; color: var(--muted); font-family: 'DM Mono', monospace; }
  .input-group label span { color: var(--accent2); font-weight: 500; }
  .input-group input {
    background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px;
    padding: 9px 12px; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 1rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; width: 100%;
  }
  .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,200,66,0.12); }
  .input-group input.ok { border-color: var(--success); background: rgba(107,255,184,0.05); }
  .input-group input.err { border-color: var(--danger); background: rgba(255,107,107,0.05); }
  .inline-feedback { font-size: 0.75rem; font-family: 'DM Mono', monospace; min-height: 14px; }
  .inline-feedback.ok { color: var(--success); }
  .inline-feedback.err { color: var(--danger); }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  button {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem;
    border: none; border-radius: 10px; padding: 11px 22px; cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  button:active { transform: scale(0.97); }
  .btn-check { background: var(--accent); color: #111; flex: 1; }
  .btn-hint { background: var(--surface2); color: var(--accent2); border: 1px solid var(--border); }
  .btn-next { background: linear-gradient(120deg, var(--accent), var(--accent2)); color: #111; flex: 1; display: none; }
  .btn-next.visible { display: block; }

  .global-feedback {
    margin-top: 14px; padding: 11px 14px; border-radius: 10px;
    font-size: 0.85rem; font-family: 'DM Mono', monospace; display: none;
    line-height: 1.5; animation: fadeIn 0.3s ease;
  }
  .global-feedback.ok { background: rgba(107,255,184,0.08); border: 1px solid rgba(107,255,184,0.3); color: var(--success); display: block; }
  .global-feedback.err { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.3); color: var(--danger); display: block; }
  .global-feedback.info { background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.3); color: #c4b5fd; display: block; }

  #score-screen { display: none; text-align: center; max-width: 560px; margin: 0 auto; padding: 32px 24px; }
  #score-screen h2 {
    font-size: 2rem; font-weight: 800;
    background: linear-gradient(120deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 8px;
  }
  #score-screen p { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.9rem; margin-bottom: 24px; }
  .score-circle {
    width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px; font-size: 2rem; font-weight: 800; color: var(--accent);
    box-shadow: 0 0 32px rgba(245,200,66,0.2);
  }
  .btn-restart { background: var(--accent); color: #111; padding: 13px 32px; font-size: 1rem; border-radius: 12px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <h1>Intensité électrique</h1>
  <p>Trouve les valeurs manquantes dans chaque circuit</p>
</header>

<div class="progress-bar-wrap">
  <div class="progress-label">
    <span id="prog-label">Exercice 1 / 5</span>
    <span id="prog-score">0 point(s)</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div id="exercise-card" class="card">
  <div class="step-badge" id="step-badge">Étape 1</div>
  <h2 id="ex-title"></h2>
  <img id="circuit-img" class="circuit-img" src="" alt="Circuit électrique"/>
  <div class="inputs-grid" id="inputs-grid"></div>
  <div class="btn-row">
    <button class="btn-hint" onclick="showHint()">💡 Indice</button>
    <button class="btn-check" onclick="checkAnswers()">Vérifier</button>
    <button class="btn-next visible" id="btn-next" onclick="nextExercise()" style="display:none">Suivant →</button>
  </div>
  <div class="global-feedback" id="global-fb"></div>
</div>

<div id="score-screen">
  <div class="score-circle" id="final-score-circle"></div>
  <h2>Bien joué !</h2>
  <p id="final-msg"></p>
  <button class="btn-restart" onclick="restart()">🔄 Recommencer</button>
</div>

const IMGS = {1: IMG1, 2: IMG2, 3: IMG3, 4: IMG4, 5: IMG5};


const exercises = [
  {
    imgKey: 1,
    title: "Circuit série – 3 ampoules en série",
    hint: "C'est un circuit avec une seule boucle. Le courant est <strong>le même partout</strong>.",
    hint2: "Ig = I1 = I2 = I3. Utilise I3=10A pour trouver les autres.",
    unknown: ["I_gen","I1","I2"],
    labels: { "I_gen": "Ig (A)", "I1": "I₁ (A)", "I2": "I₂ (A)" },
    answers: { "I_gen": 10, "I1": 10, "I2": 10 },
    explanation: "Circuit série (1 boucle) : courant identique partout. Ig = I1 = I2 = I3 = 10 A"
  },
  {
    imgKey: 2,
    title: "Circuit parallèle – 2 ampoules",
    hint: "Le courant se sépare au nœud entre A1 et A2.",
    hint2: "Loi des nœuds : Ig = I1 + I2. Donc I2 = Ig − I1 = 10 − 6.",
    unknown: ["I2"],
    labels: { "I2": "I₂ (A)" },
    answers: { "I2": 4 },
    explanation: "Loi des nœuds : I2 = Ig − I1 = 10 − 6 = 4 A"
  },
  {
    imgKey: 3,
    title: "Circuit mixte – A1 ∥ (A2 série A3)",
    hint: "A2 et A3 sont en série dans la même branche. A1 est en parallèle.",
    hint2: "A2 et A3 en série → I3 = I2 = 10 A. Nœud : I1 = Ig − I2 = 30 − 10.",
    unknown: ["I1","I3"],
    labels: { "I1": "I₁ (A)", "I3": "I₃ (A)" },
    answers: { "I1": 20, "I3": 10 },
    explanation: "I3 = I2 = 10 A (série). Nœud : I1 = Ig − I2 = 30 − 10 = 20 A"
  },
  {
    imgKey: 4,
    title: "Circuit mixte – A3 série + (A1 ∥ A2)",
    hint: "A3 est en série avec le générateur (même branche principale).",
    hint2: "I3 = Ig = 25 A. Nœud : I2 = Ig − I1 = 25 − 15 = 10 A.",
    unknown: ["I2","I3"],
    labels: { "I2": "I₂ (A)", "I3": "I₃ (A)" },
    answers: { "I2": 10, "I3": 25 },
    explanation: "A3 en série → I3 = Ig = 25 A. Nœud : I2 = 25 − 15 = 10 A"
  },
  {
    imgKey: 5,
    title: "Court-circuit !",
    hint: "Un fil sans composant est en parallèle avec l'ampoule A1.",
    hint2: "Le courant prend toujours le chemin sans résistance → tout passe par le fil. I1 = 0 A.",
    unknown: ["I1"],
    labels: { "I1": "I₁ (A)" },
    answers: { "I1": 0 },
    explanation: "Court-circuit : tout le courant passe par le fil. I1 = 0 A"
  }
];


let current = 0, score = 0, checked = false, hintLevel = 0;

function renderExercise() {
  const ex = exercises[current];
  checked = false; hintLevel = 0;
  document.getElementById('step-badge').textContent = `Étape ${current+1}`;
  document.getElementById('ex-title').textContent = ex.title;
  document.getElementById('circuit-img').src = IMGS[ex.imgKey];
  const grid = document.getElementById('inputs-grid');
  grid.innerHTML = '';
  ex.unknown.forEach(key => {
    const grp = document.createElement('div');
    grp.className = 'input-group';
    grp.innerHTML = `
      <label for="inp_${key}"><span>${ex.labels[key]}</span></label>
      <input id="inp_${key}" type="number" step="1" placeholder="… A" autocomplete="off">
      <div class="inline-feedback" id="fb_${key}"></div>`;
    grid.appendChild(grp);
  });
  grid.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', e => { if(e.key==='Enter') checkAnswers(); });
  });
  document.getElementById('global-fb').className = 'global-feedback';
  document.getElementById('global-fb').textContent = '';
  document.getElementById('btn-next').style.display = 'none';
  updateProgress();
}

function updateProgress() {
  document.getElementById('prog-label').textContent = `Exercice ${current+1} / ${exercises.length}`;
  document.getElementById('prog-score').textContent = `${score} point(s)`;
  document.getElementById('prog-fill').style.width = `${(current/exercises.length)*100}%`;
}

function checkAnswers() {
  if (checked) return;
  const ex = exercises[current];
  let allOk = true;
  ex.unknown.forEach(key => {
    const inp = document.getElementById('inp_'+key);
    const fb = document.getElementById('fb_'+key);
    const v = parseFloat(inp.value);
    const ans = ex.answers[key];
    if (!isNaN(v) && Math.abs(v - ans) < 0.5) {
      inp.classList.add('ok'); inp.classList.remove('err');
      fb.textContent = '✓ Correct !'; fb.className = 'inline-feedback ok';
    } else {
      inp.classList.add('err'); inp.classList.remove('ok');
      fb.textContent = isNaN(v) ? '⚠ Entre une valeur' : '✗ Pas encore…';
      fb.className = 'inline-feedback err';
      allOk = false;
    }
  });
  const gfb = document.getElementById('global-fb');
  if (allOk) {
    score++; checked = true;
    gfb.textContent = '🎉 Bravo ! ' + ex.explanation;
    gfb.className = 'global-feedback ok';
    document.getElementById('btn-next').style.display = 'block';
    updateProgress();
  } else {
    gfb.textContent = "🤔 Pas encore… Relis l'indice et réessaie !";
    gfb.className = 'global-feedback err';
  }
}

function showHint() {
  const ex = exercises[current];
  const gfb = document.getElementById('global-fb');
  gfb.innerHTML = '💡 ' + (hintLevel === 0 ? ex.hint : ex.hint2);
  gfb.className = 'global-feedback info';
  hintLevel = (hintLevel + 1) % 2;
}

function nextExercise() {
  current++;
  if (current >= exercises.length) showScore();
  else renderExercise();
}

function showScore() {
  document.getElementById('exercise-card').style.display = 'none';
  document.getElementById('score-screen').style.display = 'block';
  const pct = Math.round((score / exercises.length) * 100);
  document.getElementById('final-score-circle').textContent = `${score}/${exercises.length}`;
  const msg = pct >= 80 ? "Excellent ! Tu maîtrises la loi des nœuds 🔋"
             : pct >= 50 ? "Bien ! Relis les exemples du cours pour consolider."
             : "Continue à t'entraîner, tu vas y arriver ! 💪";
  document.getElementById('final-msg').textContent = msg;
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-score').textContent = `${score} point(s)`;
}

function restart() {
  current = 0; score = 0;
  document.getElementById('score-screen').style.display = 'none';
  document.getElementById('exercise-card').style.display = 'block';
  renderExercise();
}

renderExercise();
</script>
