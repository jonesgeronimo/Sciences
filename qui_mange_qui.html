<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qui mange qui ? — Écosystème</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --prairie: #2d6a4f;
    --sauterelle: #d4860a;
    --grenouille: #1a5f8a;
    --heron: #6a4a9c;
    --ver: #8a6244;
    --bg: #f7f5f0;
    --ink: #1a1f2e;
    --paper: #ffffff;
    --line: #e3ddd0;
    --human: #b5384a;
    --natural: #1a5f8a;
    --conservation: #2d6a4f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(circle at 12% 20%, rgba(45,106,79,.05), transparent 40%),
                      radial-gradient(circle at 88% 80%, rgba(26,95,138,.05), transparent 40%);
    color: var(--ink);
    line-height: 1.5;
    padding: 18px;
    max-width: 920px;
    margin: 0 auto;
  }
  header { text-align: center; margin-bottom: 14px; }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-weight: 900;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    letter-spacing: -.02em;
    line-height: 1;
  }
  .sub { color: #877f6a; font-size: .9rem; margin-top: 4px; }

  .topbar {
    display: flex; justify-content: center; gap: 22px; align-items: center;
    margin: 12px 0 18px; flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat .num { font-family: 'DM Serif Display', serif; font-weight: 900; font-size: 1.7rem; }
  .stat .lbl { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: #877f6a; }

  /* species board */
  .board { display: grid; gap: 10px; margin-bottom: 16px; }
  .species {
    background: var(--paper);
    border: 1px solid var(--line);
    border-left: 6px solid var(--sp);
    border-radius: 12px;
    padding: 12px 14px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 10px;
    transition: box-shadow .2s, transform .2s, opacity .3s;
  }
  .species.active { box-shadow: 0 0 0 3px rgba(212,123,41,.35); transform: translateX(2px); }
  .species.dead { opacity: .4; filter: grayscale(.7); }
  .species .name {
    font-family: 'DM Serif Display', serif; font-weight: 600; font-size: 1.05rem;
  }
  .species .role { font-size: .72rem; color: #877f6a; text-transform: uppercase; letter-spacing: .05em; }
  .species .relation { font-size: .76rem; color: #9a917c; margin-top: 2px; }

  .tokens { display: flex; align-items: center; gap: 8px; }
  .dots { display: flex; gap: 3px; flex-wrap: wrap; max-width: 160px; justify-content: flex-end; }
  .dot { width: 13px; height: 13px; border-radius: 50%; background: var(--sp); box-shadow: inset 0 -2px 2px rgba(0,0,0,.15); }
  .count {
    font-family: 'DM Serif Display', serif; font-weight: 900; font-size: 1.4rem;
    min-width: 28px; text-align: center; color: var(--sp);
  }
  .pm { display: flex; flex-direction: column; gap: 3px; }
  .pm button {
    width: 26px; height: 22px; border: 1px solid var(--line); background: #fff;
    border-radius: 6px; cursor: pointer; font-weight: 600; font-size: .9rem;
    color: var(--ink); line-height: 1; transition: background .15s;
  }
  .pm button:hover:not(:disabled) { background: #f0ecdf; }
  .pm button:disabled { opacity: .3; cursor: not-allowed; }

  /* control panel */
  .panel {
    background: var(--paper); border: 1px solid var(--line); border-radius: 14px;
    padding: 16px; margin-bottom: 16px;
  }
  .dice-btn {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    background: var(--ink); color: #fdfbf5; font-family: 'DM Serif Display', serif;
    font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: transform .1s, background .2s;
  }
  .dice-btn:hover { background: #3d382e; }
  .dice-btn:active { transform: scale(.98); }
  .dice-btn:disabled { opacity: .5; cursor: not-allowed; }

  .dice-face {
    display: inline-block; width: 30px; height: 30px; vertical-align: middle;
    margin-right: 8px; background: #fdfbf5; color: var(--ink); border-radius: 7px;
    font-weight: 900; text-align: center; line-height: 30px; font-family: 'DM Serif Display',serif;
  }

  .card {
    border-radius: 10px; padding: 14px; margin-top: 14px; color: #fff;
    animation: flip .4s ease;
  }
  @keyframes flip { from { transform: rotateX(80deg); opacity: 0; } to { transform: rotateX(0); opacity: 1; } }
  .card.human { background: var(--human); }
  .card.natural { background: var(--natural); }
  .card.conservation { background: var(--conservation); }
  .card .cat { font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; opacity: .85; }
  .card .title { font-family: 'DM Serif Display', serif; font-weight: 600; font-size: 1.2rem; margin: 3px 0; }
  .card .desc { font-size: .9rem; opacity: .95; }
  .card .effect { margin-top: 8px; font-weight: 600; font-size: 1rem; }

  .instruction {
    margin-top: 14px; padding: 12px 14px; border-radius: 10px;
    background: #fff7e6; border: 1px solid #f0d894; font-size: .92rem;
  }
  .instruction strong { color: var(--sauterelle); }
  .next-btn {
    margin-top: 10px; padding: 10px 18px; border: none; border-radius: 8px;
    background: var(--conservation); color: #fff; font-weight: 600; cursor: pointer;
    font-size: .95rem;
  }
  .next-btn:hover { filter: brightness(1.08); }

  .feedback { margin-top: 8px; font-size: .9rem; font-weight: 600; min-height: 1.2em; }
  .feedback.ok { color: var(--conservation); }
  .feedback.no { color: var(--human); }

  /* chart */
  .chart-wrap { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 16px; }
  .chart-wrap h3 { font-family: 'DM Serif Display', serif; font-weight: 600; font-size: 1rem; margin-bottom: 8px; }
  svg { width: 100%; height: 180px; display: block; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 8px; font-size: .76rem; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend i { width: 12px; height: 3px; border-radius: 2px; display: inline-block; }

  .log { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: 14px; max-height: 160px; overflow-y: auto; font-size: .84rem; }
  .log h3 { font-family: 'DM Serif Display', serif; font-weight: 600; font-size: 1rem; margin-bottom: 6px; }
  .log p { padding: 3px 0; border-bottom: 1px dashed var(--line); color: #6b6354; }
  .log p:last-child { border: none; }
  .log .turn-no { color: var(--ink); font-weight: 600; }

  .gameover {
    text-align: center; padding: 30px 20px; background: var(--paper);
    border: 2px solid var(--human); border-radius: 14px; margin-bottom: 16px;
  }
  .gameover h2 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--human); }
  .gameover .score { font-size: 2.6rem; font-family: 'DM Serif Display', serif; font-weight: 900; margin: 8px 0; }
  .restart { margin-top: 12px; padding: 12px 26px; border: none; border-radius: 9px; background: var(--ink); color: #fff; font-weight: 600; cursor: pointer; font-size: 1rem; }

  .hint { font-size: .78rem; color: #9a917c; text-align: center; margin-top: 6px; }

  nav {
    padding: 14px 24px; display: flex; align-items: center; gap: 20px;
    border-bottom: 1px solid var(--line); background: rgba(247,245,240,0.96);
    backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 100;
    margin: -18px -18px 18px; }
  .nav-brand { font-family: 'DM Serif Display', serif; font-size: 16px; font-weight: 700; color: var(--conservation); text-decoration: none; }
  .nav-links { display: flex; gap: 6px; margin-left: auto; }
  .nav-link { font-size: 13px; font-weight: 700; color: #6b6354; text-decoration: none; padding: 6px 14px; border-radius: 99px; transition: background .15s; }
  .nav-link:hover { background: var(--prairie); color: #fff; }
</style>
</head>
<body>
<nav>
  <a class="nav-brand" href="index.html">🌿 Sciences</a>
  <div class="nav-links">
    <a class="nav-link" href="activites.html">← Activités</a>
  </div>
</nav>
<header>
  <h1>Qui mange qui ?</h1>
  <div class="sub">Fais durer ton écosystème le plus longtemps possible</div>
</header>

<div class="topbar">
  <div class="stat"><div class="num" id="turnNum">0</div><div class="lbl">Tours tenus</div></div>
  <div class="stat"><div class="num" id="aliveNum">5</div><div class="lbl">Espèces vivantes</div></div>
</div>

<div class="board" id="board"></div>

<div class="panel" id="panel">
  <button class="dice-btn" id="diceBtn">🎲 Lancer le dé</button>
  <div id="cardZone"></div>
  <div id="stepZone"></div>
  <div class="feedback" id="feedback"></div>
</div>

<div id="gameoverZone"></div>

<div class="chart-wrap">
  <h3>Évolution des populations</h3>
  <svg id="chart" viewBox="0 0 600 180" preserveAspectRatio="none"></svg>
  <div class="legend" id="legend"></div>
</div>

<div class="log">
  <h3>Journal</h3>
  <div id="logBody"><p>La partie commence. Chaque espèce a 4 jetons.</p></div>
</div>

<script>
// ---------- DATA ----------
const SPECIES = [
  { id:'heron',     name:'Le Héron',     role:'Consommateur 3', color:'var(--heron)',     hex:'#6a4a9c', prey:'grenouille', pred:null },
  { id:'grenouille',name:'La Grenouille',role:'Consommateur 2', color:'var(--grenouille)',hex:'#2f7fb5', prey:'sauterelle', pred:'heron' },
  { id:'sauterelle',name:'La Sauterelle',role:'Consommateur 1', color:'var(--sauterelle)',hex:'#d97b29', prey:'prairie',    pred:'grenouille' },
  { id:'prairie',   name:'La Prairie',   role:'Producteur',     color:'var(--prairie)',   hex:'#5a8f3c', prey:null,         pred:'sauterelle' },
];
const VER = { id:'ver', name:'Le Ver de terre', role:'Décomposeur', color:'var(--ver)', hex:'#8a6244' };
// resolution order: top -> bottom
const ORDER = ['heron','grenouille','sauterelle','prairie'];

const EVENTS = {
  human: [
    ['Braconnage','Battue organisée contre les hérons.','heron',-2],
    ['Drainage','On assèche la zone humide, les grenouilles souffrent.','grenouille',-2],
    ['Urbanisation','Une route grignote la prairie.','prairie',-1],
    ['Épandage d\'insecticide','Les champs voisins sont massivement traités.','sauterelle',-2],
    ['Fauchage précoce','On coupe l\'herbe trop tôt, les insectes manquent d\'abri.','sauterelle',-1],
    ['Déforestation','On rase la végétation environnante.','prairie',-2],
  ],
  natural: [
    ['Sécheresse sévère','La végétation grille sous la chaleur.','prairie',-2],
    ['Hiver rigoureux','Le gel est mortel pour les amphibiens.','grenouille',-2],
    ['Année à insectes','Conditions idéales pour les sauterelles.','sauterelle',+1],
    ['Tempête violente','Les nids de hérons sont détruits en nombre.','heron',-3],
    ['Bonne saison des pluies','La prairie est luxuriante.','prairie',+1],
    ['Dérangement','Le passage répété fait fuir quelques hérons.','heron',-1],
  ],
  conservation: [
    ['Réserve naturelle','La zone est protégée, les hérons reviennent.','heron',+1],
    ['Réintroduction','Des grenouilles élevées en captivité sont relâchées.','grenouille',+1],
    ['Revégétalisation','On replante des prairies naturelles.','prairie',+1],
    ['Corridor écologique','Les insectes circulent mieux.','sauterelle',+1],
    ['Interdiction des pesticides','Les amphibiens se rétablissent.','grenouille',+1],
    ['Restauration du marais','On recrée des zones humides végétalisées.','prairie',+1],
  ],
};
const CAT_LABEL = { human:'Intervention humaine', natural:'Événement naturel', conservation:'Conservation' };

// ---------- STATE ----------
let state, turn, history, phase, currentCard, expected, stepIndex, deadThisTurn, gameOver;

function init() {
  state = { heron:4, grenouille:4, sauterelle:4, prairie:4, ver:4 };
  turn = 0; history = [{...state}]; phase='roll'; currentCard=null;
  expected=null; stepIndex=0; deadThisTurn=[]; gameOver=false;
  document.getElementById('gameoverZone').innerHTML='';
  document.getElementById('cardZone').innerHTML='';
  document.getElementById('stepZone').innerHTML='';
  document.getElementById('feedback').textContent='';
  document.getElementById('logBody').innerHTML='<p>La partie commence. Chaque espèce a 4 jetons.</p>';
  document.getElementById('diceBtn').disabled=false;
  document.getElementById('panel').style.display='block';
  render(); drawChart();
}

// ---------- RENDER BOARD ----------
function render() {
  const board=document.getElementById('board');
  board.innerHTML='';
  [...SPECIES, VER].forEach(sp=>{
    const v=state[sp.id];
    const dead=v<=0;
    const div=document.createElement('div');
    div.className='species'+(dead?' dead':'');
    div.style.setProperty('--sp', sp.color);
    div.id='sp-'+sp.id;
    let rel='';
    if(sp.id==='ver') rel='Recycle la matière morte → nourrit la Prairie';
    else {
      const prey=sp.prey?SPECIES.find(s=>s.id===sp.prey).name:'le soleil';
      const pred=sp.pred?SPECIES.find(s=>s.id===sp.pred).name:'personne';
      rel='Mange : '+prey+'  •  Mangé par : '+pred;
    }
    let dots='';
    for(let i=0;i<Math.min(v,12);i++) dots+='<span class="dot"></span>';
    div.innerHTML=`
      <div>
        <div class="name">${sp.name} ${dead?'— éteinte':''}</div>
        <div class="role">${sp.role}</div>
        <div class="relation">${rel}</div>
      </div>
      <div class="tokens">
        <div class="dots">${dots}</div>
        <div class="count">${v}</div>
        <div class="pm">
          <button onclick="adjust('${sp.id}',1)" data-plus="${sp.id}">+</button>
          <button onclick="adjust('${sp.id}',-1)" data-minus="${sp.id}">−</button>
        </div>
      </div>`;
    board.appendChild(div);
  });
  document.getElementById('turnNum').textContent=turn;
  const alive=[...SPECIES,VER].filter(s=>state[s.id]>0).length;
  document.getElementById('aliveNum').textContent=alive;
  // disable +/- unless in an editing phase
  const editing = (phase==='applyCard'||phase==='interaction'||phase==='equilibrium'||phase==='ver');
  document.querySelectorAll('.pm button').forEach(b=>b.disabled=!editing);
}

// ---------- DICE / TURN ----------
document.getElementById('diceBtn').addEventListener('click', rollDice);

function rollDice() {
  if(gameOver) return;
  // Worm recharge check at dice roll (uses pre-turn state)
  if(turn>0 && state.ver>=3 && state.prairie>0){
    state.prairie+=1;
    log('🪱 Le ver de terre (≥3) recharge la Prairie : +1.');
  }
  turn++;
  deadThisTurn=[];
  const d=Math.floor(Math.random()*6)+1;
  const cat = d<=2?'human':(d<=4?'natural':'conservation');
  const pool=EVENTS[cat];
  currentCard={...{}, cat, data: pool[Math.floor(Math.random()*pool.length)], die:d};
  phase='applyCard';
  turnStart={...state};
  const [title,desc,target,delta]=currentCard.data;
  expected={ id:target, delta };
  document.getElementById('diceBtn').disabled=true;
  document.getElementById('cardZone').innerHTML=`
    <div class="card ${cat}">
      <div class="cat"><span class="dice-face">${d}</span> ${CAT_LABEL[cat]}</div>
      <div class="title">${title}</div>
      <div class="desc">${desc}</div>
      <div class="effect">Effet : ${SPECIES.find(s=>s.id===target).name} ${delta>0?'+':''}${delta}</div>
    </div>`;
  document.getElementById('stepZone').innerHTML=`
    <div class="instruction">À toi : applique l'effet de la carte. Clique <strong>${delta>0?'+':'−'}</strong> sur <strong>${SPECIES.find(s=>s.id===target).name}</strong> ${Math.abs(delta)} fois.</div>`;
  document.getElementById('feedback').textContent='';
  highlight(target);
  render();
}

let turnStart;
function adjust(id,dir){
  if(gameOver) return;
  state[id]=Math.max(0, state[id]+dir);
  render();
  checkPhase(id,dir);
  drawChart();
}

function checkPhase(id,dir){
  const fb=document.getElementById('feedback');
  if(phase==='applyCard'){
    // need to apply expected delta to expected id
    const want=expected;
    // recompute applied by comparing to history snapshot of this turn start
    const startVal=turnStart[want.id];
    const applied=state[want.id]-startVal;
    // also flag wrong species
    if(id!==want.id){ fb.className='feedback no'; fb.textContent='Ce n\'est pas la bonne espèce pour cette carte.'; return; }
    if(applied===want.delta){
      fb.className='feedback ok'; fb.textContent='Effet de la carte appliqué ✓';
      startInteraction();
    } else if((want.delta>0&&applied>want.delta)||(want.delta<0&&applied<want.delta)){
      fb.className='feedback no'; fb.textContent='Tu es allé trop loin, ajuste.';
    } else {
      fb.className='feedback no'; fb.textContent='Continue : il reste '+(want.delta-applied)+' à appliquer.';
    }
  } else if(phase==='interaction'){
    evalInteractionStep(id,dir);
  } else if(phase==='equilibrium'){
    evalEquilibrium();
  } else if(phase==='ver'){
    evalVer(id,dir);
  }
}

// ---------- INTERACTION PHASE (live read, top->bottom) ----------
function startInteraction(){
  phase='interaction';
  stepIndex=0;
  // snapshot the "dead before" set already in deadThisTurn updated as we go
  nextInteractionStep();
}

function nextInteractionStep(){
  // skip dead species
  while(stepIndex<ORDER.length && state[ORDER[stepIndex]]<=0) stepIndex++;
  if(stepIndex>=ORDER.length){ startEquilibrium(); return; }
  const id=ORDER[stepIndex];
  const sp=SPECIES.find(s=>s.id===id);
  // compute expected change with LIVE values (current state)
  let change=0;
  const reasons=[];
  if(sp.prey && state[sp.prey]>0){
    const diff=state[id]-state[sp.prey];
    if(diff>=2){ change-=1; reasons.push('2+ de plus que ta nourriture → −1'); }
    else if(diff<=-2){ change+=1; reasons.push('2+ de moins que ta nourriture → +1'); }
  }
  if(sp.pred && state[sp.pred]>0){
    const diff=state[id]-state[sp.pred];
    if(diff>=2){ change+=1; reasons.push('2+ de plus que ton prédateur → +1'); }
    else if(diff<=-2){ change-=1; reasons.push('2+ de moins que ton prédateur → −1'); }
  }
  // extinction cascade
  if(sp.prey && state[sp.prey]<=0){ change-=1; reasons.push('ta nourriture est éteinte → −1 (famine)'); }
  if(sp.pred && state[sp.pred]<=0){ change+=1; reasons.push('ton prédateur est éteint → +1 (tu prolifères)'); }
  expectedStep={ id, change };
  highlight(id);
  const fb=document.getElementById('feedback'); fb.textContent='';
  document.getElementById('stepZone').innerHTML=`
    <div class="instruction">
      <strong>Règles d'interaction — ${sp.name}</strong><br>
      Compare ${sp.name} à sa nourriture ${sp.prey?(state[sp.prey]<=0?'(<b>éteinte</b> → famine, −1)':'('+SPECIES.find(s=>s.id===sp.prey).name+' : '+state[sp.prey]+')'):'(le soleil — aucune)'} 
      et à son prédateur ${sp.pred?(state[sp.pred]<=0?'(<b>éteint</b> → tu prolifères, +1)':'('+SPECIES.find(s=>s.id===sp.pred).name+' : '+state[sp.pred]+')'):'(aucun)'}.<br>
      Applique le résultat avec + / −, ou passe si rien ne change.
      <br><button class="next-btn" onclick="confirmStep()">Rien à changer / Valider</button>
    </div>`;
  stepStartVal=state[id];
  render();
}

let expectedStep, stepStartVal;
function evalInteractionStep(id,dir){
  const fb=document.getElementById('feedback');
  if(id!==expectedStep.id){ fb.className='feedback no'; fb.textContent='Modifie d\'abord l\'espèce en surbrillance ('+SPECIES.find(s=>s.id===expectedStep.id).name+').'; return; }
  const applied=state[id]-stepStartVal;
  if(applied===expectedStep.change){
    fb.className='feedback ok'; fb.textContent='Correct ✓';
  } else {
    fb.className='feedback no';
    fb.textContent='Pas tout à fait — relis la règle et la comparaison ci-dessus.';
  }
}
function confirmStep(){
  const fb=document.getElementById('feedback');
  const applied=state[expectedStep.id]-stepStartVal;
  if(applied!==expectedStep.change){
    if(expectedStep.change===0){ fb.className='feedback no'; fb.textContent='Ici rien ne devait changer — remets l\'espèce à sa valeur.'; return; }
    fb.className='feedback no'; fb.textContent='Pas encore correct. Vérifie la comparaison.'; return;
  }
  // log if changed
  if(expectedStep.change!==0){
    const sp=SPECIES.find(s=>s.id===expectedStep.id);
    log('↔ '+sp.name+' : '+(expectedStep.change>0?'+1':'−1')+' (interaction).');
  }
  if(state[expectedStep.id]<=0) markDead(expectedStep.id);
  stepIndex++;
  nextInteractionStep();
}

// ---------- EQUILIBRIUM ----------
function startEquilibrium(){
  phase='equilibrium';
  // find any 3 consecutive (in full chain prairie..heron) with equal alive counts
  const chain=['prairie','sauterelle','grenouille','heron'];
  eqTargets=[];
  for(let i=0;i<=chain.length-3;i++){
    const a=chain[i],b=chain[i+1],c=chain[i+2];
    if(state[a]>0&&state[b]>0&&state[c]>0&&state[a]===state[b]&&state[b]===state[c]){
      eqTargets=[a,b,c]; break;
    }
  }
  if(eqTargets.length===0){ startVer(); return; }
  eqStart={}; eqTargets.forEach(id=>eqStart[id]=state[id]);
  eqTargets.forEach(id=>highlight(id,true));
  document.getElementById('stepZone').innerHTML=`
    <div class="instruction">
      <strong>Règle d'équilibre !</strong> ${eqTargets.map(id=>SPECIES.find(s=>s.id===id).name).join(', ')} ont le même nombre de jetons.
      Donne <strong>+1</strong> à chacune de ces trois espèces.
      <br><button class="next-btn" onclick="confirmEquilibrium()">Valider</button>
    </div>`;
  document.getElementById('feedback').textContent='';
  render();
}
let eqTargets=[], eqStart={};
function evalEquilibrium(){
  const fb=document.getElementById('feedback');
  const ok=eqTargets.every(id=>state[id]-eqStart[id]===1);
  if(ok){ fb.className='feedback ok'; fb.textContent='Bien — équilibre récompensé ✓'; }
  else { fb.className='feedback no'; fb.textContent='Chaque espèce concernée doit recevoir exactement +1.'; }
}
function confirmEquilibrium(){
  const ok=eqTargets.every(id=>state[id]-eqStart[id]===1);
  const fb=document.getElementById('feedback');
  if(!ok){ fb.className='feedback no'; fb.textContent='Donne +1 à chacune des trois espèces en surbrillance.'; return; }
  log('✦ Équilibre : '+eqTargets.map(id=>SPECIES.find(s=>s.id===id).name).join(', ')+' +1.');
  startVer();
}

// ---------- VER ----------
function startVer(){
  phase='ver';
  // Worm +1 if ANY species lost one or more tokens this turn (vs turn start), else -1
  const lostTokens = [...SPECIES].some(s => state[s.id] < turnStart[s.id]);
  verExpected = lostTokens ? +1 : -1;
  if(state.ver<=0){ // already dead, skip
    finishTurn(); return;
  }
  verStart=state.ver;
  highlight('ver');
  document.getElementById('stepZone').innerHTML=`
    <div class="instruction">
      <strong>Le Ver de terre</strong> — ${lostTokens?'une ou plusieurs espèces ont perdu des jetons ce tour : il y a de la matière morte à décomposer.':'aucune espèce n\'a perdu de jeton ce tour : rien à recycler.'}<br>
      Applique <strong>${verExpected>0?'+1':'−1'}</strong> au Ver de terre.
      <br><button class="next-btn" onclick="confirmVer()">Valider</button>
    </div>`;
  document.getElementById('feedback').textContent='';
  render();
}
let verExpected, verStart;
function evalVer(id,dir){
  const fb=document.getElementById('feedback');
  if(id!=='ver'){ fb.className='feedback no'; fb.textContent='Modifie le Ver de terre.'; return; }
  if(state.ver-verStart===verExpected){ fb.className='feedback ok'; fb.textContent='Correct ✓'; }
  else { fb.className='feedback no'; fb.textContent='Applique exactement '+(verExpected>0?'+1':'−1')+'.'; }
}
function confirmVer(){
  const fb=document.getElementById('feedback');
  if(state.ver-verStart!==verExpected){ fb.className='feedback no'; fb.textContent='Applique exactement '+(verExpected>0?'+1':'−1')+' au Ver.'; return; }
  log('🪱 Ver de terre : '+(verExpected>0?'+1':'−1')+'.');
  if(state.ver<=0) markDead('ver');
  finishTurn();
}

// ---------- TURN END ----------
function markDead(id){
  if(!deadThisTurn.includes(id)){
    deadThisTurn.push(id);
    const sp=[...SPECIES,VER].find(s=>s.id===id);
    log('☠ '+sp.name+' s\'est éteinte. C\'est définitif.');
  }
}
function finishTurn(){
  clearHighlight();
  history.push({...state});
  drawChart();
  document.getElementById('stepZone').innerHTML='';
  document.getElementById('cardZone').innerHTML='';
  // check game over: all 5 extinct
  const allDead=[...SPECIES,VER].every(s=>state[s.id]<=0);
  if(allDead){ endGame(); return; }
  phase='roll';
  document.getElementById('diceBtn').disabled=false;
  document.getElementById('feedback').className='feedback ok';
  document.getElementById('feedback').textContent='Tour terminé. Relance le dé.';
  render();
}

function endGame(){
  gameOver=true;
  document.getElementById('panel').style.display='none';
  document.getElementById('gameoverZone').innerHTML=`
    <div class="gameover">
      <h2>Écosystème effondré</h2>
      <div class="score">${turn} tours</div>
      <p>Toutes les espèces se sont éteintes. Ton écosystème a tenu ${turn} tours.</p>
      <button class="restart" onclick="init()">Rejouer</button>
    </div>`;
}

// ---------- HELPERS ----------
function highlight(id, add=false){
  if(!add) clearHighlight();
  const el=document.getElementById('sp-'+id);
  if(el) el.classList.add('active');
}
function clearHighlight(){ document.querySelectorAll('.species').forEach(e=>e.classList.remove('active')); }
function log(msg){
  const body=document.getElementById('logBody');
  const p=document.createElement('p');
  p.innerHTML='<span class="turn-no">Tour '+turn+' :</span> '+msg;
  body.insertBefore(p, body.firstChild);
}

// ---------- CHART ----------
function drawChart(){
  const svg=document.getElementById('chart');
  const W=600,H=180,pad=20;
  const maxV=Math.max(8, ...history.flatMap(h=>[...SPECIES,VER].map(s=>h[s.id])));
  const n=history.length;
  const xstep=n>1?(W-2*pad)/(n-1):0;
  const y=v=>H-pad-(v/maxV)*(H-2*pad);
  let svgc='';
  // grid
  for(let g=0;g<=maxV;g+=2){ svgc+=`<line x1="${pad}" y1="${y(g)}" x2="${W-pad}" y2="${y(g)}" stroke="#e7e0cf" stroke-width="1"/>`; }
  [...SPECIES,VER].forEach(sp=>{
    let pts=history.map((h,i)=>`${pad+i*xstep},${y(h[sp.id])}`).join(' ');
    svgc+=`<polyline points="${pts}" fill="none" stroke="${sp.hex}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>`;
  });
  svg.innerHTML=svgc;
  document.getElementById('legend').innerHTML=[...SPECIES,VER].map(sp=>`<span><i style="background:${sp.hex}"></i>${sp.name}</span>`).join('');
}

init();
</script>
